<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>404 - Page Not Found</title>
    <meta name="description" content="The page you are looking for doesn't exist or has been moved.">
    <meta name="robots" content="noindex, follow">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>">

    <!-- Original 404 page styles -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            /* keeps rem-based sizing predictable across browsers/zoom levels */
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh; /* better on mobile browsers with dynamic toolbars */
            overflow-x: hidden;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .page_404 {
            width: 100%;
            padding: 20px;
            padding: clamp(16px, 5vw, 20px);
        }

        .container {
            max-width: 800px;
            width: 100%;
            margin: auto;
            text-align: center;
        }

        .four_zero_four_bg {
            background: url("https://cdn.dribbble.com/users/285475/screenshots/2083086/dribbble_1.gif") center center no-repeat;
            background-size: contain;
            width: 100%;
            /* fluid height instead of a fixed px value, with sensible min/max */
            height: clamp(180px, 45vw, 400px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background-repeat: no-repeat;
        }

        .four_zero_four_bg h1 {
            /* fluid type scale so the mirrored "404" never overflows small screens */
            font-size: clamp(40px, 12vw, 90px);
            font-weight: bold;
            color: #222;
            margin-top: 20px;
            transform: scaleX(-1);
            user-select: none;
            line-height: 1;
        }

        /* Screen reader only text (invisible) */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .contant_box_404 {
            margin-top: -30px;
            padding: 0 10px;
        }

        .contant_box_404 h3 {
            font-size: clamp(24px, 5.5vw, 36px);
            color: #333;
            margin-bottom: 15px;
            font-weight: bold;
            line-height: 1.2;
        }

        .contant_box_404 p {
            font-size: clamp(15px, 3vw, 18px);
            color: #666;
            margin-bottom: 25px;
        }

        /* Original link style – kept for reference, but button will override */
        .link_404 {
            display: inline-block;
            text-decoration: none;
            background: #FF813F;
            color: #fff;
            padding: 14px 30px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            transition: background 0.3s, transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 5px 15px rgba(255, 129, 63, 0.35);
        }

        .link_404:hover {
            background: #ff6a1f;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 129, 63, 0.45);
        }

        @media (max-width: 768px) {
            .four_zero_four_bg {
                height: clamp(220px, 62vw, 320px);
            }
            .contant_box_404 {
                margin-top: 20px;
            }
        }

        /* Extra-small phones: keep the gif prominent, but give the text room to breathe */
        @media (max-width: 380px) {
            .four_zero_four_bg {
                height: clamp(200px, 60vw, 260px);
            }
            .four_zero_four_bg h1 {
                margin-top: 12px;
            }
            .contant_box_404 {
                margin-top: 24px;
            }
            .contant_box_404 h3 {
                margin-bottom: 10px;
            }
            .contant_box_404 p {
                margin-bottom: 18px;
            }
            .bmc-button {
                width: 100%;
                justify-content: center;
            }
        }

        /* Short/landscape viewports on phones: the gif shouldn't push content off-screen */
        @media (max-height: 480px) and (orientation: landscape) {
            .four_zero_four_bg {
                height: clamp(140px, 35vh, 220px);
            }
            .contant_box_404 {
                margin-top: 10px;
            }
        }

        /* Respect users who've asked for reduced motion */
        @media (prefers-reduced-motion: reduce) {
            .link_404,
            .bmc-button {
                transition: none !important;
            }
            .link_404:hover {
                transform: none;
            }
        }

        @media print {
            .four_zero_four_bg {
                background: none !important;
                height: auto;
                min-height: 60px;
            }
            .four_zero_four_bg h1 {
                transform: none;
                font-size: 48px;
                color: #000;
            }
            .link_404,
            .bmc-button {
                background: #fff !important;
                color: #000 !important;
                border: 2px solid #000 !important;
                box-shadow: none !important;
            }
            body {
                background: #fff;
            }
        }
    </style>

    <!-- Official Buy Me a Coffee button styles -->
    <style>
        .bmc-button img {
            width: 27px !important;
            margin-bottom: 1px !important;
            box-shadow: none !important;
            border: none !important;
            vertical-align: middle !important;
        }
        .bmc-button {
            line-height: 36px !important;
            height: 37px !important;
            text-decoration: none !important;
            display: inline-flex !important;
            align-items: center !important;
            color: #ffffff !important;
            background-color: #FF813F !important;
            border-radius: 3px !important;
            border: 1px solid transparent !important;
            padding: 1px 9px !important;
            font-size: 23px !important;
            letter-spacing: 0.6px !important;
            box-shadow: 0px 1px 2px rgba(190, 190, 190, 0.5) !important;
            -webkit-box-shadow: 0px 1px 2px 2px rgba(190, 190, 190, 0.5) !important;
            margin: 0 auto !important;
            font-family: 'Cookie', cursive !important;
            -webkit-box-sizing: border-box !important;
            box-sizing: border-box !important;
            -o-transition: 0.3s all linear !important;
            -webkit-transition: 0.3s all linear !important;
            -moz-transition: 0.3s all linear !important;
            -ms-transition: 0.3s all linear !important;
            transition: 0.3s all linear !important;
        }
        .bmc-button:hover,
        .bmc-button:active,
        .bmc-button:focus {
            -webkit-box-shadow: 0px 1px 2px 2px rgba(190, 190, 190, 0.5) !important;
            text-decoration: none !important;
            box-shadow: 0px 1px 2px 2px rgba(190, 190, 190, 0.5) !important;
            opacity: 0.85 !important;
            color: #ffffff !important;
        }
        .bmc-button:focus-visible {
            outline: 3px solid #222 !important;
            outline-offset: 2px !important;
        }

        /* Small mobile adjustment for the button (keeps it responsive) */
        @media (max-width: 480px) {
            .bmc-button {
                font-size: 18px !important;
                height: auto !important;
                padding: 10px 16px !important;
                line-height: 1.3 !important;
            }
            .bmc-button img {
                width: 22px !important;
            }
        }
    </style>

    <!-- Google Font for the button -->
    <link href="https://fonts.googleapis.com/css?family=Cookie" rel="stylesheet">
</head>

<body>

    <main class="page_404" role="main" aria-labelledby="error-heading">

        <div class="container">

            <!-- Decorative GIF background with mirrored 404 (hidden from screen readers) -->
            <div class="four_zero_four_bg" aria-hidden="true">
                <h1 aria-label="404">404</h1>
            </div>

            <!-- Accessible heading for assistive technology -->
            <h1 id="error-heading" class="sr-only">404 - Page Not Found</h1>

            <div class="contant_box_404">
                <h3>Looks Like You're Lost</h3>
                <p>The page you are looking for is not available or has been moved.</p>

                <!-- Official Buy Me a Coffee button (replaces the simple link) -->
                <a class="bmc-button" target="_blank" rel="noopener noreferrer" href="https://www.buymeacoffee.com/puspendu">
                    <img src="https://www.buymeacoffee.com/assets/img/BMC-btn-logo.svg" alt="Buy me a coffee">
                    <span style="margin-left:5px">Buy me a coffee</span>
                </a>
            </div>

        </div>

    </main>

</body>
</html>
